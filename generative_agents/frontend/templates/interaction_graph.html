{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <a href="/" class="btn btn-primary">返回主頁</a>
        <h2 class="text-center">角色互動關係視覺化</h2>
        
        <!-- 頁籤導航 -->
        <ul class="nav nav-tabs" role="tablist">
            <li role="presentation" class="active">
                <a href="#force-directed" aria-controls="force-directed" role="tab" data-toggle="tab">互動次數力導向圖</a>
            </li>
            <li role="presentation">
                <a href="#chat-matrix" aria-controls="chat-matrix" role="tab" data-toggle="tab">對話長度矩陣圖</a>
            </li>
        </ul>
        
        <!-- 頁籤內容 -->
        <div class="tab-content">
            <!-- 互動次數力導向圖 -->
            <div role="tabpanel" class="tab-pane active" id="force-directed">
                <div class="chart-container" style="width: 100%; height: 600px; border: 1px solid #ddd; overflow: hidden;"></div>
                <div class="controls" style="margin-top: 10px;">
                    <button id="reset-zoom" class="btn btn-sm btn-default">重置視圖</button>
                    <span style="margin-left: 20px; font-size: 12px; color: #666;">提示: 可以拖拽畫布移動視圖，滾輪縮放，拖拽節點調整位置</span>
                </div>
            </div>
            
            <!-- 對話長度矩陣圖 -->
            <div role="tabpanel" class="tab-pane" id="chat-matrix">
                <div class="chart-container" style="width: 100%; height: 600px;"></div>
                <div id="debug-info" style="margin-top: 10px; font-family: monospace; font-size: 12px;"></div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}

{% block js_content %}
<script src="https://d3js.org/d3.v6.min.js"></script>
<script>
// 從 Flask 獲取數據
const interactionData = {{ interaction_data|tojson }};
const chatLengthData = {{ chat_length_data|tojson }};
const personaNames = {{ personas|tojson }};

// 打印接收到的數據用於調試
console.log("Interaction Data:", interactionData);
console.log("Chat Length Data:", chatLengthData);
console.log("Persona Names:", personaNames);

// 添加調試信息的函數
function addDebugInfo(message) {
    const debugElement = document.getElementById('debug-info');
    if (debugElement) {
        debugElement.innerHTML += message + '<br>';
    }
    console.log("Debug:", message);
}

// 當頁面加載完成後初始化圖表
document.addEventListener('DOMContentLoaded', function() {
    // 初始化互動次數力導向圖
    createForceDirectedGraph(
        interactionData, 
        "#force-directed .chart-container"
    );
    
    // 初始化對話長度矩陣圖
    try {
        createChatLengthMatrix(
            chatLengthData,
            "#chat-matrix .chart-container",
            personaNames
        );
    } catch (error) {
        addDebugInfo('矩陣圖錯誤: ' + error.message);
        console.error("矩陣圖創建錯誤:", error);
        document.querySelector("#chat-matrix .chart-container").innerHTML = 
            '<div style="padding: 20px; text-align: center; color: #d9534f;">' +
            '<h3>無法創建矩陣圖</h3>' +
            '<p>錯誤信息: ' + error.message + '</p>' +
            '<p>請檢查對話數據是否有效</p>' +
            '</div>';
    }
    
    // 頁籤切換時重新調整圖表大小
    $('a[data-toggle="tab"]').on('shown.bs.tab', function(e) {
        window.dispatchEvent(new Event('resize'));
    });
    
    // 重置視圖按鈕事件
    document.getElementById('reset-zoom').addEventListener('click', function() {
        resetForceDirectedGraph();
    });
});

// 全局變數用於保存力導向圖的縮放和平移狀態
let forceDirectedSvg = null;
let forceDirectedG = null;
let zoom = null;

// 創建力導向圖
function createForceDirectedGraph(data, containerSelector) {
    // 清空容器
    d3.select(containerSelector).html("");
    
    // 設置畫布大小
    const width = document.querySelector(containerSelector).clientWidth;
    const height = 600;

    // 定義顏色比例尺
    const color = d3.scaleOrdinal(d3.schemeCategory10);

    // 創建SVG元素
    const svg = d3.select(containerSelector)
        .append("svg")
        .attr("width", width)
        .attr("height", height);
    
    // 保存全局引用
    forceDirectedSvg = svg;
    
    // 添加縮放和平移功能
    zoom = d3.zoom()
        .scaleExtent([0.1, 10])
        .on("zoom", function(event) {
            g.attr("transform", event.transform);
        });
    
    svg.call(zoom);
    
    // 主圖層，所有元素都添加到這裡以便於整體縮放和平移
    const g = svg.append("g");
    forceDirectedG = g;

    // 創建力導向圖
    const simulation = d3.forceSimulation(data.nodes)
        .force("link", d3.forceLink(data.links).id(d => d.id)
            .distance(d => 200 / (d.value + 1)))
        .force("charge", d3.forceManyBody().strength(-300))
        .force("center", d3.forceCenter(width / 2, height / 2))
        .force("collision", d3.forceCollide().radius(50));

    // 繪製連線
    const link = g.append("g")
        .selectAll("line")
        .data(data.links)
        .enter()
        .append("line")
        .attr("stroke-width", d => Math.sqrt(d.value) * 2)
        .attr("stroke", "#999")
        .attr("stroke-opacity", 0.6);

    // 創建節點組
    const node = g.append("g")
        .selectAll(".node")
        .data(data.nodes)
        .enter()
        .append("g")
        .attr("class", "node")
        .call(d3.drag()
            .on("start", dragstarted)
            .on("drag", dragged)
            .on("end", dragended));

    // 添加頭像圖片
    node.append("image")
        .attr("xlink:href", d => "/static/assets/village/agents/" + d.id + "/portrait.png")
        .attr("x", -20)
        .attr("y", -20)
        .attr("width", 40)
        .attr("height", 40)
        .attr("clip-path", "circle(20px at 20px 20px)");

    // 添加圓形背景
    node.append("circle")
        .attr("r", 20)
        .attr("fill", "none")
        .attr("stroke", d => color(d.group))
        .attr("stroke-width", 2);

    // 添加角色名稱
    node.append("text")
        .attr("dy", 35)
        .attr("text-anchor", "middle")
        .text(d => d.id)
        .attr("font-family", "黑體")
        .attr("font-size", "12px")
        .attr("pointer-events", "none");

    // 添加互動次數文本到連線上
    g.append("g")
        .selectAll(".link-text")
        .data(data.links)
        .enter()
        .append("text")
        .attr("class", "link-text")
        .text(d => d.value)
        .attr("font-family", "黑體")
        .attr("font-size", "12px")
        .attr("fill", "#333")
        .attr("dy", -5);

    // 添加圖例
    const legend = g.append("g")
        .attr("transform", "translate(20, 20)");

    legend.append("text")
        .attr("x", 0)
        .attr("y", 0)
        .text("互動次數")
        .attr("font-family", "黑體")
        .attr("font-size", "14px")
        .attr("font-weight", "bold");

    // 模擬動畫
    simulation.on("tick", () => {
        link
            .attr("x1", d => d.source.x)
            .attr("y1", d => d.source.y)
            .attr("x2", d => d.target.x)
            .attr("y2", d => d.target.y);

        node
            .attr("transform", d => `translate(${d.x}, ${d.y})`);

        // 更新連線文本位置
        g.selectAll(".link-text")
            .attr("x", d => (d.source.x + d.target.x) / 2)
            .attr("y", d => (d.source.y + d.target.y) / 2);
    });

    // 拖拽功能
    function dragstarted(event, d) {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        d.fx = d.x;
        d.fy = d.y;
    }

    function dragged(event, d) {
        d.fx = event.x;
        d.fy = event.y;
    }

    function dragended(event, d) {
        if (!event.active) simulation.alphaTarget(0);
        // 不重置位置，讓節點保持在用戶拖拽的位置
        // d.fx = null;
        // d.fy = null;
    }
}

// 重置力導向圖視圖
function resetForceDirectedGraph() {
    if (forceDirectedSvg && zoom) {
        forceDirectedSvg.transition().duration(750).call(
            zoom.transform,
            d3.zoomIdentity
        );
    }
}

// 創建對話長度矩陣圖
function createChatLengthMatrix(data, containerSelector, personas) {
    // 檢查數據
    addDebugInfo('創建矩陣圖');
    addDebugInfo('角色數: ' + personas.length);
    
    // 清空容器
    d3.select(containerSelector).html("");
    
    // 檢查數據有效性
    if (!personas || personas.length === 0) {
        throw new Error("沒有角色數據");
    }
    
    // 創建一個完整的矩陣
    let matrix = [];
    for (let i = 0; i < personas.length; i++) {
        let row = [];
        for (let j = 0; j < personas.length; j++) {
            row.push(0);
        }
        matrix.push(row);
    }
    
    // 填充矩陣數據
    addDebugInfo('填充矩陣數據');
    const linksData = data.links || [];
    addDebugInfo('連接數: ' + linksData.length);
    
    if (linksData.length === 0) {
        addDebugInfo('警告: 沒有對話數據連接');
    }
    
    for (let link of linksData) {
        try {
            const source = link.source;
            const target = link.target;
            const value = link.length || 0;
            
            // 獲取角色索引
            let sourceIdx, targetIdx;
            
            if (typeof source === 'object' && source !== null) {
                sourceIdx = personas.indexOf(source.id);
                addDebugInfo(`源是對象: id=${source.id}, 索引=${sourceIdx}`);
            } else {
                sourceIdx = personas.indexOf(source);
                addDebugInfo(`源是字符串: ${source}, 索引=${sourceIdx}`);
            }
            
            if (typeof target === 'object' && target !== null) {
                targetIdx = personas.indexOf(target.id);
                addDebugInfo(`目標是對象: id=${target.id}, 索引=${targetIdx}`);
            } else {
                targetIdx = personas.indexOf(target);
                addDebugInfo(`目標是字符串: ${target}, 索引=${targetIdx}`);
            }
            
            // 檢查索引是否有效
            if (sourceIdx < 0) {
                addDebugInfo(`警告: 找不到源角色 ${source} 在角色列表中`);
                continue;
            }
            
            if (targetIdx < 0) {
                addDebugInfo(`警告: 找不到目標角色 ${target} 在角色列表中`);
                continue;
            }
            
            // 填充矩陣
            matrix[sourceIdx][targetIdx] = value;
            addDebugInfo(`設置矩陣[${sourceIdx}][${targetIdx}] = ${value}`);
        } catch (error) {
            addDebugInfo(`處理連接時出錯: ${error.message}`);
            console.error("處理連接時出錯:", error, link);
        }
    }
    
    // 設置畫布尺寸
    const margin = { top: 100, right: 20, bottom: 20, left: 100 };
    const width = document.querySelector(containerSelector).clientWidth - margin.left - margin.right;
    const height = 600 - margin.top - margin.bottom;
    
    // 計算每個單元格的大小
    const cellSize = Math.min(
        (width) / personas.length,
        (height) / personas.length
    );
    
    // 創建SVG
    const svg = d3.select(containerSelector)
        .append("svg")
        .attr("width", width + margin.left + margin.right)
        .attr("height", height + margin.top + margin.bottom)
        .append("g")
        .attr("transform", `translate(${margin.left},${margin.top})`);
    
    // 定義顏色比例尺
    const maxVal = d3.max(matrix, row => d3.max(row)) || 1;
    addDebugInfo('最大對話長度: ' + maxVal);
    
    const color = d3.scaleSequential()
        .domain([0, maxVal])
        .interpolator(d3.interpolateYlOrRd);
    
    // 為每個角色創建defs（頭像定義）
    const defs = svg.append("defs");
    
    personas.forEach(name => {
        defs.append("pattern")
            .attr("id", `avatar-${name}`)
            .attr("width", 1)
            .attr("height", 1)
            .append("image")
            .attr("xlink:href", `/static/assets/village/agents/${name}/portrait.png`)
            .attr("width", cellSize)
            .attr("height", cellSize)
            .attr("preserveAspectRatio", "xMidYMid slice");
    });
    
    // 畫矩陣
    addDebugInfo('繪製矩陣單元格');
    
    // 為行添加標籤（左側頭像）
    svg.selectAll(".row-label")
        .data(personas)
        .enter()
        .append("image")
        .attr("class", "row-label")
        .attr("xlink:href", d => `/static/assets/village/agents/${d}/portrait.png`)
        .attr("x", -cellSize)
        .attr("y", (d, i) => i * cellSize)
        .attr("width", cellSize - 5)
        .attr("height", cellSize - 5);
    
    // 為列添加標籤（頂部頭像）
    svg.selectAll(".col-label")
        .data(personas)
        .enter()
        .append("image")
        .attr("class", "col-label")
        .attr("xlink:href", d => `/static/assets/village/agents/${d}/portrait.png`)
        .attr("x", (d, i) => i * cellSize)
        .attr("y", -cellSize)
        .attr("width", cellSize - 5)
        .attr("height", cellSize - 5);
    
    // 添加行標籤文本
    svg.selectAll(".row-text")
        .data(personas)
        .enter()
        .append("text")
        .attr("class", "row-text")
        .attr("x", -cellSize - 5)
        .attr("y", (d, i) => i * cellSize + cellSize / 2)
        .attr("text-anchor", "end")
        .attr("alignment-baseline", "middle")
        .attr("font-family", "黑體")
        .attr("font-size", "12px")
        .text(d => d);
    
    // 添加列標籤文本
    svg.selectAll(".col-text")
        .data(personas)
        .enter()
        .append("text")
        .attr("class", "col-text")
        .attr("x", (d, i) => i * cellSize + cellSize / 2)
        .attr("y", -cellSize - 5)
        .attr("text-anchor", "middle")
        .attr("font-family", "黑體")
        .attr("font-size", "12px")
        .text(d => d);
    
    // 繪製矩陣單元格
    personas.forEach((source, i) => {
        personas.forEach((target, j) => {
            // 跳過對角線（自己對自己）
            if (i === j) return;
            
            const value = matrix[i][j];
            
            // 創建矩陣單元格
            svg.append("rect")
                .attr("x", j * cellSize)
                .attr("y", i * cellSize)
                .attr("width", cellSize - 1)
                .attr("height", cellSize - 1)
                .attr("fill", value > 0 ? color(value) : "#f8f8f8")
                .attr("stroke", "#ccc")
                .attr("stroke-width", 1)
                .on("mouseover", function() {
                    d3.select(this).attr("stroke", "#333").attr("stroke-width", 2);
                })
                .on("mouseout", function() {
                    d3.select(this).attr("stroke", "#ccc").attr("stroke-width", 1);
                })
                .append("title")
                .text(`${source} → ${target}: ${value} 字符`);
            
            // 如果有對話，添加文本標籤
            if (value > 0) {
                svg.append("text")
                    .attr("x", j * cellSize + cellSize / 2)
                    .attr("y", i * cellSize + cellSize / 2)
                    .attr("text-anchor", "middle")
                    .attr("alignment-baseline", "middle")
                    .attr("font-family", "黑體")
                    .attr("font-size", "10px")
                    .attr("fill", value > maxVal/2 ? "white" : "black")
                    .text(value);
            }
        });
    });
    
    // 添加圖例
    const legendWidth = 20;
    const legendHeight = 200;
    
    const legendScale = d3.scaleLinear()
        .domain([0, maxVal])
        .range([legendHeight, 0]);
    
    const legendAxis = d3.axisRight(legendScale)
        .ticks(5);
    
    const legendGroup = svg.append("g")
        .attr("transform", `translate(${width + 10}, 0)`);
    
    // 定義漸變
    const defs2 = legendGroup.append("defs");
    const gradient = defs2.append("linearGradient")
        .attr("id", "legend-gradient")
        .attr("x1", "0%")
        .attr("y1", "100%")
        .attr("x2", "0%")
        .attr("y2", "0%");
    
    // 加入顏色停止點
    gradient.selectAll("stop")
        .data(d3.range(0, 1.01, 0.1))
        .enter()
        .append("stop")
        .attr("offset", d => d)
        .attr("stop-color", d => color(d * maxVal));
    
    // 繪製漸變矩形
    legendGroup.append("rect")
        .attr("width", legendWidth)
        .attr("height", legendHeight)
        .attr("fill", "url(#legend-gradient)");
    
    // 添加軸
    legendGroup.append("g")
        .attr("transform", `translate(${legendWidth}, 0)`)
        .call(legendAxis);
    
    // 添加標題
    legendGroup.append("text")
        .attr("x", legendWidth / 2)
        .attr("y", -10)
        .attr("text-anchor", "middle")
        .attr("font-family", "黑體")
        .attr("font-size", "12px")
        .text("對話長度 (字符)");
    
    // 添加圖表標題
    svg.append("text")
        .attr("x", width / 2)
        .attr("y", -margin.top / 2)
        .attr("text-anchor", "middle")
        .attr("font-family", "黑體")
        .attr("font-size", "16px")
        .attr("font-weight", "bold")
        .text("角色對話長度矩陣");
    
    addDebugInfo('矩陣圖創建完成');
}
</script>
{% endblock js_content %}
